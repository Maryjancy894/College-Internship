<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Google Meet UI</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

body{
background:#0f1014;
overflow:hidden;
}

.main{
height:100vh;
background:#202124;
}

.share-box{
background:#303134;
}

.video-box{
width:220px;
height:120px;
}

.control-btn{
width:45px;
height:45px;
border-radius:50%;
background:#3c4043;
border:none;
display:flex;
align-items:center;
justify-content:center;
padding:0;
flex-shrink:0;
}

.call-btn{
background:#ea4335;
}

.meeting{
z-index:999;
font-size:14px;
}

/* MOBILE */

@media(max-width:768px){

.top-user{
font-size:10px;
padding:6px 10px!important;
max-width:160px;
white-space:nowrap;
overflow:hidden;
}

.share-box{
width:95%!important;
margin-top:70px!important;
padding:10px 14px!important;

display:flex!important;
flex-direction:row!important;
justify-content:center!important;
align-items:center;

gap:8px;
font-size:9px;
flex-wrap:nowrap;
}

.share-box span{
white-space:nowrap;
}

.share-box button{
font-size:10px;
padding:5px 10px;
white-space:nowrap;
}

/* FIXED TITLE */

.main-title{
font-size:30px!important;
white-space:nowrap;
padding:0 10px;
}

.center-btns{
flex-direction:column;
width:85%;
}

.center-btns button{
width:100%;
}

.video-box{
width:135px!important;
height:90px;
right:10px!important;
bottom:85px!important;
}

.controls{
overflow-x:auto;
flex-wrap:nowrap!important;
scrollbar-width:none;
}

.controls::-webkit-scrollbar{
display:none;
}

.meeting{
bottom:75px!important;
left:5px!important;
font-size:10px;
background:rgba(0,0,0,0.7);
padding:4px 8px;
border-radius:10px;
}

}

</style>
</head>

<body>

<div class="container-fluid main position-relative text-white">

<!-- Top -->

<div class="position-absolute top-0 start-0 m-3">
<div class="bg-secondary bg-opacity-25 px-3 py-2 rounded-pill top-user">
<i class="bi bi-display"></i>
MaryJancy (Presenting)
</div>
</div>

<!-- Share -->

<div class="position-absolute top-0 start-50 translate-middle-x mt-2">

<div class="share-box rounded-4 shadow p-3 d-flex align-items-center">

<span>
<i class="bi bi-pause-fill"></i>
meet.google.com is sharing a window
</span>

<button class="btn btn-primary rounded-pill">
Stop Sharing
</button>

<span class="text-info">
Hide
</span>

</div>

</div>

<!-- Center -->

<div class="h-100 d-flex flex-column justify-content-center align-items-center text-center">

<h1 class="display-4 fw-bold main-title">
MaryJancy Presenting
</h1>

<p class="text-secondary fs-5 mt-3">
To avoid an infinity mirror,
<br>
don't share your entire screen.
</p>

<div class="d-flex gap-3 mt-4 center-btns">

<button class="btn btn-outline-light rounded-pill px-4 py-2">
Show my screen anyway
</button>

<button class="btn btn-outline-light rounded-pill px-4 py-2">
Stop presenting
</button>

</div>

</div>

<!-- Video -->

<div class="position-absolute bottom-0 end-0 m-4 video-box">

<div class="bg-secondary rounded-4 p-3 h-100">

<div class="d-flex justify-content-between small">

<span class="d-flex align-items-center gap-2">

<i class="bi bi-camera-video-off-fill"></i>

<span>MaryJancy</span>

</span>

<i class="bi bi-arrows-fullscreen"></i>

</div>

</div>

</div>

<!-- Meeting -->

<div class="position-absolute start-0 bottom-0 ms-2 mb-3 meeting">
09:35 | iqy-hrqo-xqf
</div>

<!-- Controls -->

<div class="position-absolute bottom-0 start-50 translate-middle-x mb-3 w-100 px-2">

<div class="d-flex justify-content-center gap-2 controls">

<button class="btn control-btn text-white">
<i class="bi bi-chevron-up"></i>
</button>
<button class="btn control-btn text-white">
<i class="bi bi-mic-mute-fill"></i>
</button>

<button class="btn control-btn text-white">
<i class="bi bi-camera-video-off-fill"></i>
</button>

<button class="btn control-btn text-white">
<i class="bi bi-hand-index-thumb"></i>
</button>

<button class="btn control-btn text-white">
<i class="bi bi-three-dots-vertical"></i>
</button>

<button class="btn control-btn call-btn text-white">
<i class="bi bi-telephone-x-fill"></i>
</button>

</div>

</div>

</div>

</body>
</html>
