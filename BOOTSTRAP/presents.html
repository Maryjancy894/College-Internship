<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Google Meet UI Clone</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <style>

    body{
      margin:0;
      background:#0b0b0c;
      font-family: 'Segoe UI', sans-serif;
      overflow:hidden;
    }

    .main-screen{
      height:100vh;
      position:relative;
      background:linear-gradient(to bottom,#1d1d1f,#111112);
    }

    /* TOP LEFT */
    .top-user{
      position:absolute;
      top:15px;
      left:20px;
      color:white;
      background:rgba(255,255,255,0.08);
      padding:8px 18px;
      border-radius:30px;
      backdrop-filter: blur(10px);
      font-size:14px;
    }

    /* FLOATING SHARE BAR */
    .share-bar{
      position:absolute;
      top:10px;
      left:50%;
      transform:translateX(-50%);
      background:#2d2f31;
      padding:12px 20px;
      border-radius:15px;
      display:flex;
      align-items:center;
      gap:15px;
      color:white;
      box-shadow:0 0 20px rgba(0,0,0,0.4);
    }

    .stop-btn{
      background:#8ab4f8;
      border:none;
      padding:10px 22px;
      border-radius:25px;
      font-weight:600;
    }

    .hide-text{
      color:#8ab4f8;
      cursor:pointer;
    }

    /* CENTER BOX */
    .center-box{
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      text-align:center;
      color:white;
    }

    .center-box h1{
      font-size:42px;
      font-weight:700;
      margin-bottom:20px;
    }

    .center-box p{
      color:#b0b3b8;
      font-size:16px;
      line-height:30px;
    }

    .custom-btn{
      border:1px solid #5f6368;
      background:transparent;
      color:white;
      padding:12px 28px;
      border-radius:30px;
      transition:0.3s;
      font-weight:500;
    }

    .custom-btn:hover{
      background:#303134;
      transform:scale(1.05);
    }

    /* MINI VIDEO */
    .video-box{
      position:absolute;
      right:25px;
      bottom:110px;
      width:210px;
      height:120px;
      background:#2b2d31;
      border-radius:18px;
      padding:15px;
      color:white;
      box-shadow:0 0 20px rgba(0,0,0,0.5);
    }

    /* BOTTOM CONTROLS */
    .bottom-controls{
      position:absolute;
      bottom:25px;
      width:100%;
      display:flex;
      justify-content:center;
      align-items:center;
      gap:15px;
    }

    .control-btn{
      width:58px;
      height:58px;
      border:none;
      border-radius:50%;
      background:#2f3136;
      color:white;
      font-size:22px;
      transition:0.3s;
      box-shadow:0 4px 10px rgba(0,0,0,0.4);
    }

    .control-btn:hover{
      transform:translateY(-5px);
      background:#3a3d42;
    }

    .end-call{
      background:#ea4335;
    }

    .end-call:hover{
      background:#ff5a4d;
    }

    /* BOTTOM LEFT */
    .meeting-id{
      position:absolute;
      bottom:30px;
      left:25px;
      color:white;
      font-size:15px;
    }

  </style>
</head>

<body>

<div class="container-fluid main-screen">

  <!-- TOP USER -->
  <div class="top-user">
    <i class="bi bi-display"></i>
    MaryJancy (Presenting)
  </div>

  <!-- SHARE BAR -->
  <div class="share-bar">

    <span>
      <i class="bi bi-pause-fill"></i>
      meet.google.com is sharing a window
    </span>

    <button class="stop-btn">
      Stop Sharing
    </button>

    <span class="hide-text">Hide</span>

  </div>

  <!-- CENTER CONTENT -->
  <div class="center-box">

    <h1>MaryJancy Presenting</h1>

    <p>
      To avoid an infinity mirror, don't share your entire screen or browser window.
      <br>
      Share just a tab or a different window instead.
    </p>

    <div class="d-flex justify-content-center gap-4 mt-4">

      <button class="custom-btn">
        Show my screen anyway
      </button>

      <button class="custom-btn">
        Stop presenting
      </button>

    </div>

  </div>

  <!-- VIDEO BOX -->
  <div class="video-box">

    <div class="d-flex justify-content-between">

      <span>
        <i class="bi bi-camera-video-off-fill"></i>
        MaryJancy
      </span>

      <i class="bi bi-arrows-fullscreen"></i>

    </div>

  </div>

  <!-- MEETING ID -->
  <div class="meeting-id">
    09:35 | iqy-hrqo-xqf
  </div>

  <!-- BOTTOM CONTROLS -->
  <div class="bottom-controls">

    <button class="control-btn">
      <i class="bi bi-chevron-up"></i>
    </button>

    <button class="control-btn">
      <i class="bi bi-mic-mute-fill"></i>
    </button>

    <button class="control-btn">
      <i class="bi bi-camera-video-off-fill"></i>
    </button>

    <button class="control-btn">
      <i class="bi bi-display"></i>
    </button>

    <button class="control-btn">
      <i class="bi bi-emoji-smile"></i>
    </button>

    <button class="control-btn">
      <i class="bi bi-hand-index-thumb"></i>
    </button>

    <button class="control-btn">
      <i class="bi bi-three-dots-vertical"></i>
    </button>

    <button class="control-btn end-call">
      <i class="bi bi-telephone-x-fill"></i>
    </button>

  </div>

</div>

</body>
</html>
